repos:
  - repo: local
    hooks:
      - id: black
        name: black (Python formatter)
        entry: black
        language: system
        types: [python]

      - id: ruff
        name: ruff (Python linter)
        entry: ruff check --fix
        language: system
        types: [python]

      - id: clang-format
        name: clang-format (C/C++ formatter)
        entry: clang-format -i
        language: system
        files: \.(c|h|cpp|hpp)$

      - id: mypy
        name: mypy (Python type checker)
        entry: mypy python/femu/
        language: system
        types: [python]
        pass_filenames: false
