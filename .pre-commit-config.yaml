repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format (Python formatter)
        entry: ruff format
        language: system
        types: [python]

      - id: ruff
        name: ruff (Python linter)
        entry: ruff check --fix
        language: system
        types: [python]

      - id: clang-format
        name: clang-format (C/C++ formatter)
        entry: clang-format -i
        language: system
        files: \.(c|h|cpp|hpp)$

      - id: ty
        name: ty (Python type checker)
        entry: ty check python/femu/
        language: system
        types: [python]
        pass_filenames: false
